<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>COUP — Lobby</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="lobby-wrap">

  <!-- Title card -->
  <div class="title-card" style="padding:20px 28px 16px;">
    <div class="title-ornament">✦ ✦ ✦</div>
    <div id="roomTitle" onclick="copyRoomCode()" style="
      font-family:'Cinzel',serif;font-size:28px;font-weight:900;color:var(--brown);letter-spacing:4px;
      cursor:pointer; user-select:none;
    ">Sala ---</div>
    <div id="copy-hint" style="font-size:10px;color:var(--brown-light);letter-spacing:1.5px;margin-top:4px;opacity:.6;">
      toque para copiar o código
    </div>
    <div id="copy-toast" style="
      font-size:10px;color:var(--green);letter-spacing:1.5px;margin-top:4px;
      opacity:0;transition:opacity .25s;font-weight:700;
    ">✓ Código copiado!</div>
    <div id="playerCount" style="font-size:11px;color:var(--brown-light);letter-spacing:2px;margin-top:6px;">
      Aguardando jogadores
    </div>
  </div>

  <!-- Players panel -->
  <div class="waiting-panel">
    <div class="section-label">Jogadores</div>
    <div id="playerList" style="display:flex;flex-direction:column;gap:0;"></div>
  </div>

  <!-- Host controls -->
  <div class="waiting-panel" id="hostControls" style="display:none;">
    <div class="section-label">Variante</div>
    <div class="toggle-row" style="margin-bottom:16px;">
      <button class="toggle-btn active" id="btnAmbassador" onclick="setVariant('ambassador')">Embaixador</button>
      <button class="toggle-btn"        id="btnInquisitor" onclick="setVariant('inquisitor')">Inquisidor</button>
    </div>
    <button class="primary-btn" id="btnStart" style="margin-top:0;">INICIAR PARTIDA</button>
  </div>

  <!-- Guest wait -->
  <div class="waiting-panel" id="guestWait" style="display:none;text-align:center;">
    <div style="font-family:'IM Fell English',serif;font-style:italic;font-size:14px;color:var(--brown-light);">
      Aguardando o host iniciar...
    </div>
  </div>

  <p class="error-msg" id="errorMsg"></p>

  <button onclick="window.location.href='/'" style="
    background:transparent; border:none; color:var(--brown-light);
    font-size:12px; letter-spacing:1px; cursor:pointer; padding:8px 0;
    font-family:'Cinzel',serif; opacity:.7;
  ">← Início</button>

</div>

<script>
function copyRoomCode() {
  const code = sessionStorage.getItem('roomCode');
  if (!code) return;

  function showToast() {
    const hint  = document.getElementById('copy-hint');
    const toast = document.getElementById('copy-toast');
    hint.style.opacity  = '0';
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; hint.style.opacity = '.6'; }, 2000);
  }

  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(showToast);
  } else {
    const el = document.createElement('textarea');
    el.value = code;
    el.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast();
  }
}
</script>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/lobby.js"></script>
</body>
</html>
