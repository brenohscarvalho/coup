<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#3a2510"/>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#7a5220"/>
      <stop offset="100%" stop-color="#2a1808"/>
    </radialGradient>
  </defs>
  <!-- Fleur-de-lis / ornament -->
  <text x="256" y="300" font-family="serif" font-size="260" font-weight="900"
        text-anchor="middle" fill="#C9922A" opacity="0.15">⚜</text>
  <text x="256" y="300" font-family="serif" font-size="260" font-weight="900"
        text-anchor="middle" fill="url(#gold)">⚜</text>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8b84a"/>
      <stop offset="100%" stop-color="#a07010"/>
    </linearGradient>
  </defs>
  <!-- COUP text -->
  <text x="256" y="460" font-family="serif" font-size="72" font-weight="900"
        letter-spacing="18" text-anchor="middle" fill="#F5E6C8" opacity="0.9">COUP</text>
</svg>
