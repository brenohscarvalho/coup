<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>COUP — Lobby</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="lobby-wrap">

  <!-- Title card -->
  <div class="title-card" style="padding:20px 28px 16px;">
    <div class="title-ornament">✦ ✦ ✦</div>
    <div id="roomTitle" style="font-family:'Cinzel',serif;font-size:28px;font-weight:900;color:var(--brown);letter-spacing:4px;">
      Sala ---
    </div>
    <div id="playerCount" style="font-size:11px;color:var(--brown-light);letter-spacing:2px;margin-top:6px;">
      Aguardando jogadores
    </div>
  </div>

  <!-- Players panel -->
  <div class="waiting-panel">
    <div class="section-label">Jogadores</div>
    <div id="playerList" style="display:flex;flex-direction:column;gap:0;"></div>
  </div>

  <!-- Host controls -->
  <div class="waiting-panel" id="hostControls" style="display:none;">
    <div class="section-label">Variante</div>
    <div class="toggle-row" style="margin-bottom:16px;">
      <button class="toggle-btn active" id="btnAmbassador" onclick="setVariant('ambassador')">Embaixador</button>
      <button class="toggle-btn"        id="btnInquisitor" onclick="setVariant('inquisitor')">Inquisidor</button>
    </div>
    <button class="primary-btn" id="btnStart" style="margin-top:0;">INICIAR PARTIDA</button>
  </div>

  <!-- Guest wait -->
  <div class="waiting-panel" id="guestWait" style="display:none;text-align:center;">
    <div style="font-family:'IM Fell English',serif;font-style:italic;font-size:14px;color:var(--brown-light);">
      Aguardando o host iniciar...
    </div>
  </div>

  <p class="error-msg" id="errorMsg"></p>

  <button onclick="window.location.href='/'" style="
    background:transparent; border:none; color:var(--brown-light);
    font-size:12px; letter-spacing:1px; cursor:pointer; padding:8px 0;
    font-family:'Cinzel',serif; opacity:.7;
  ">← Início</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/lobby.js"></script>
</body>
</html>
