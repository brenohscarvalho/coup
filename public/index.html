<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Coup</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="page">
    <div class="card-panel" style="margin-top: 40px;">
      <div class="title">⚜ COUP ⚜</div>
      <div class="subtitle">Cidade-Estado Italiana</div>
    </div>

    <div class="card-panel">
      <label class="label">Seu nome</label>
      <input class="input" id="playerName" placeholder="Alessandro" maxlength="16">
    </div>

    <div class="card-panel">
      <p id="errorMsg" style="color: var(--red); font-size:13px; min-height:18px; text-align:center;"></p>
      <button class="btn btn-primary" id="btnCreate">CRIAR SALA</button>
      <div style="margin: 10px 0; text-align:center; color: var(--brown); font-size:12px;">ou</div>
      <label class="label">Código da sala</label>
      <input class="input" id="roomCode" placeholder="COUP-42" maxlength="10" style="margin-bottom:8px;">
      <button class="btn btn-outline" id="btnJoin">ENTRAR NA SALA</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/index.js"></script>
</body>
</html>
